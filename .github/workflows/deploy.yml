name: Deploy to Azure VM

on:
  push:
    branches:
      - master   # or your deployment branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ACTIONS_STEP_DEBUG: true        # enables debug logging
      DEPLOY_PATH: ~/projects/SimpleAiSolutions/SentimentAnalysis
      BRANCH: master

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Deploy to Azure VM via SSH
      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
              cd ~/projects/SimpleAiSolutions/SentimentAnalysis
              git pull origin master
              docker-compose up -d --build
